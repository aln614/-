name: Build Windows Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Validate JavaScript
        run: npm run check

      - name: Build portable EXE
        run: npm run dist
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"

      - name: Verify release EXE
        shell: pwsh
        run: |
          $exe = Get-ChildItem -Path dist -Filter *.exe -File | Select-Object -First 1
          if (-not $exe) { throw "Build finished but dist/*.exe was not created." }
          if ($exe.Length -lt 1000000) { throw "Release EXE is unexpectedly small: $($exe.Length) bytes." }
          Write-Host "Release EXE: $($exe.FullName) ($($exe.Length) bytes)"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: LocalApiImageGenerator-windows
          path: dist/*.exe

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.exe
          generate_release_notes: true
